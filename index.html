<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Musify</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Musify</h1>
    </header>

    <main>
      <section id="importSection">
        <div id="dropzone">Drop MusicVault.zip here or click to select</div>

        <div id="importProgress">
          <div id="importBar"></div>
        </div>
        <div id="importLabel"></div>
      </section>

      <section id="albumsSection">
        <h2>Albums</h2>
        <div id="albumGrid"></div>
      </section>

      <section id="tracksSection">
        <h2 id="tracksTitle">Tracks</h2>
        <ul id="trackList"></ul>
      </section>

      <!-- Full-screen album view -->
      <section id="albumView" class="hidden">
        <button id="backButton">← Back</button>
        <img id="albumViewCover">
        <h2 id="albumViewTitle"></h2>
        <ul id="albumViewTrackList"></ul>
      </section>
    </main>

    <footer id="playerBar">
      <div id="nowPlaying">
        <span id="nowPlayingTitle">Nothing playing</span>
      </div>
      <div id="playerControls">
        <button id="prevBtn">⏮</button>
        <button id="playPauseBtn">▶</button>
        <button id="nextBtn">⏭</button>
      </div>
      <audio id="audioPlayer"></audio>
    </footer>
  </div>

  <script src="jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
