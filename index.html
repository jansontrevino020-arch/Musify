<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musify</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#000000">
</head>
<body>

  <div id="dropZone">Drop ZIP Here</div>

  <div id="albumsTab">
    <h1>Albums</h1>
    <div id="albumGrid"></div>
  </div>

  <div id="albumViewTab" style="display:none;">
    <button id="backToAlbumsBtn">Back</button>
    <h2 id="albumViewTitle"></h2>
    <ul id="albumViewTrackList"></ul>
  </div>

  <div id="nowPlayingBar">
    <div>
      <div id="nowPlayingTitle">No Track</div>
      <div id="nowPlayingAlbum"></div>
    </div>
    <button id="playPauseBtn" disabled>Play</button>
  </div>

  <script src="jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
