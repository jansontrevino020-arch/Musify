<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Musify</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1 class="logo">Musify</h1>
  </header>

  <!-- MAIN CONTENT -->
  <main>

    <!-- ALBUM GRID -->
    <section id="albumsTab" class="albums-tab">
      <h2 class="section-title">Your Library</h2>
      <div id="albumGrid" class="album-grid"></div>
    </section>

    <!-- ALBUM VIEW -->
    <section id="albumViewTab" class="album-view">
      <button id="backToAlbumsBtn" class="back-btn">← Back</button>
      <h2 id="albumViewTitle" class="album-view-title"></h2>
      <ul id="albumViewTrackList" class="track-list"></ul>
    </section>

  </main>

  <!-- NOW PLAYING BAR -->
  <footer class="now-playing">
    <img id="nowPlayingCover" class="np-cover" />
    <div class="np-info">
      <div id="nowPlayingTitle" class="np-title">No song playing</div>
      <div id="nowPlayingArtist" class="np-album"></div>
    </div>
    <button id="playPauseBtn" class="np-btn">Play</button>
  </footer>

  <div id="dropZone" class="drop-zone">Drop ZIP to import</div>

  <script src="jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
